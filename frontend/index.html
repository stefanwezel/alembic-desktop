<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Alembic</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Overview View -->
  <section id="view-overview" style="display:none;">
    <div class="app-toolbar">
      <h1 class="sessions-header">Sessions</h1>
    </div>
    <div class="sessions-scroll-area" id="sessions-list"></div>
  </section>

  <!-- Upload View -->
  <section id="view-upload" style="display:none;">
    <div class="page-wrapper">
      <div class="upload-container">
        <input type="text" id="directory-path" class="browse-button" placeholder="/path/to/photos">
        <button type="button" id="browse-button" class="upload-button" style="display:none;">Browse</button>
        <button type="button" id="load-images-button" class="upload-button">Load Images</button>
      </div>
    </div>
    <div class="overlay" id="upload-overlay">
      <div class="progress-text" id="progress-text">Processing images...</div>
      <div class="spinner" id="spinner"></div>
    </div>
  </section>

  <!-- Decision View -->
  <section id="view-decision" style="display:none;">
    <div class="img-container">
      <div class="img-wrapper">
        <img id="img-left" alt="Left Image">
      </div>
      <div class="img-wrapper right">
        <img id="img-right" alt="Right Image">
      </div>
    </div>
    <button class="return-overview-button" id="pause-session-button">
      <svg class="icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg>
      Pause
    </button>
  </section>

  <!-- Completed View -->
  <section id="view-completed" style="display:none;">
    <div class="simple-text-page">
      <div class="completed-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="3" fill="none"/>
          <path d="M14 24l7 7 13-13" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Looks like you're done!</h1>
      <button class="transparent-text-button" id="return-overview-button">Return to session overview</button>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
