<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alembic</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Overview View -->
  <section id="view-overview" style="display:none;">
    <div class="page-wrapper fixed-top">
      <h1 class="sessions-header">Sessions</h1>
      <div id="sessions-list"></div>
    </div>
  </section>

  <!-- Upload View -->
  <section id="view-upload" style="display:none;">
    <div class="page-wrapper">
      <div class="upload-container">
        <input type="text" id="directory-path" class="browse-button" placeholder="/path/to/photos">
        <button type="button" id="browse-button" class="upload-button" onclick="browseDirectory()" style="display:none;">Browse</button>
        <button type="button" class="upload-button" onclick="createSessionFromDirectory()">Load Images</button>
      </div>
    </div>
    <div class="overlay" id="upload-overlay">
      <div class="progress-text" id="progress-text">Processing images...</div>
      <div class="spinner" id="spinner"></div>
    </div>
  </section>

  <!-- Decision View -->
  <section id="view-decision" style="display:none;">
    <div class="img-container">
      <div class="img-wrapper">
        <img id="img-left" alt="Left Image">
      </div>
      <div class="img-wrapper right">
        <img id="img-right" alt="Right Image">
      </div>
    </div>
    <button class="return-overview-button" onclick="pauseSession()">⏸️ Pause session</button>
  </section>

  <!-- Completed View -->
  <section id="view-completed" style="display:none;">
    <div class="simple-text-page">
      <h1>☑️ Looks like you're done!</h1>
      <button class="transparent-text-button" onclick="showView('overview'); loadOverview()">Return to session overview</button>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
